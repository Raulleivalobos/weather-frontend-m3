<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>App Clima</title>
        <meta
            name="description"
            content="Aplicación web moderna para pronóstico del clima con arquitectura SASS y Dark Mode."
        />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />

        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />

        <link rel="stylesheet" href="assets/css/main.css" />
    </head>

    <body class="d-flex flex-column min-vh-100">
        <div class="bg-atmosphere"></div>
        <nav class="navbar navbar-expand-lg navbar-dark shadow-sm sticky-top">
            <div class="container">
                <a class="navbar-brand fw-bold" href="#">
                    <i class="fa-solid fa-cloud-sun-rain me-2"></i>ClimaCL
                </a>
                <button
                    class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNav"
                    aria-controls="navbarNav"
                    aria-expanded="false"
                    aria-label="Toggle navigation"
                >
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <div class="navbar-nav ms-auto">
                        <a
                            id="link-home"
                            class="nav-link active"
                            aria-current="page"
                            href="#"
                            >Inicio</a
                        >
                        <a class="nav-link" href="#">Acerca de</a>
                    </div>
                </div>
            </div>
        </nav>

        <header class="container my-5 text-center">
            <h1 class="fw-bold text-primary">Pronóstico del Clima Hoy</h1>
            <p class="text-light opacity-75">
                Consulta el clima actual y el pronóstico semanal de tus
                localidades favoritas.
            </p>
        </header>

        <main class="d-flex flex-column flex-grow-1">
            <section id="vista-home" class="py-4">
                <div class="container">
                    <div id="clima-container" class="row g-4"></div>
                </div>
            </section>

            <section
                id="vista-detalle"
                class="py-4 d-none flex-grow-1 detail-view"
            >
                <div class="container">
                    <button
                        id="btn-volver"
                        class="btn btn-outline-primary mb-4 detail-view__btn-back"
                    >
                        <i class="fa-solid fa-arrow-left me-2"></i>Volver al
                        listado
                    </button>

                    <div id="detalle-container"></div>
                </div>
            </section>
        </main>

        <footer class="text-white text-center py-4 mt-auto">
            <div class="container">
                <p class="mb-0">
                    <i class="fa-solid fa-temperature-half me-2"></i>ClimaCL
                    &copy; 2026 - Raul Leiva Lobos
                </p>
            </div>
        </footer>

        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>

        <script src="assets/js/main.js"></script>
    </body>
</html>
